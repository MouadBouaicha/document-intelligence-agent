<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 655" font-family="sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="655" fill="#0f172a" rx="12"/>

  <!-- ── BROWSER ─────────────────────────────────────────────────── -->
  <rect x="200" y="20" width="500" height="72" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="450" y="44"  text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="bold">Browser (SPA)</text>
  <text x="450" y="63"  text-anchor="middle" fill="#7dd3fc" font-size="11">sidebar.js · viewer.js · chunks.js · chat.js · api.js</text>
  <text x="450" y="81"  text-anchor="middle" fill="#475569" font-size="10">Upload · Layout viewer · Chunk explorer · Chat</text>

  <!-- Browser → FastAPI -->
  <line x1="450" y1="92" x2="450" y2="143" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="458" y="122" fill="#64748b" font-size="10">HTTP / SSE</text>

  <!-- ── FASTAPI ──────────────────────────────────────────────────── -->
  <rect x="155" y="148" width="590" height="72" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="450" y="172" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">FastAPI  (main.py)</text>
  <text x="450" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">POST /upload · GET /process · GET /pages/image · GET /pages/layout · GET /chunks</text>
  <text x="450" y="209" text-anchor="middle" fill="#475569" font-size="10">POST /chat  ·  DELETE /documents  ·  DELETE /chat/history  —  all routes support SSE</text>

  <!-- FastAPI → DocProcessor -->
  <line x1="295" y1="220" x2="208" y2="278" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="193" y="257" fill="#64748b" font-size="10">upload</text>

  <!-- FastAPI → Agent -->
  <line x1="605" y1="220" x2="697" y2="278" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="635" y="257" fill="#64748b" font-size="10">chat</text>

  <!-- ── DOC PROCESSOR ──────────────────────────────────────────── -->
  <rect x="20" y="283" width="370" height="225" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.8"/>
  <text x="205" y="306" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">Document Processor</text>

  <!-- PDF sub-box -->
  <rect x="35" y="315" width="158" height="175" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="114" y="335" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">PDF · PyMuPDF</text>
  <text x="114" y="354" text-anchor="middle" fill="#475569" font-size="10">render 120 DPI → PIL</text>
  <text x="114" y="374" text-anchor="middle" fill="#34d399" font-size="10">① find_tables()</text>
  <text x="114" y="390" text-anchor="middle" fill="#475569" font-size="10">   → table regions</text>
  <text x="114" y="410" text-anchor="middle" fill="#34d399" font-size="10">② get_drawings()</text>
  <text x="114" y="426" text-anchor="middle" fill="#475569" font-size="10">   union-find merge</text>
  <text x="114" y="442" text-anchor="middle" fill="#475569" font-size="10">   → figure regions</text>
  <text x="114" y="462" text-anchor="middle" fill="#34d399" font-size="10">③ get_text("blocks")</text>
  <text x="114" y="478" text-anchor="middle" fill="#475569" font-size="10">   → text blocks</text>

  <!-- Image sub-box -->
  <rect x="208" y="315" width="167" height="175" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="291" y="335" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Image files</text>
  <text x="291" y="354" text-anchor="middle" fill="#475569" font-size="10">PNG · JPG · TIFF …</text>
  <text x="291" y="388" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">EasyOCR</text>
  <text x="291" y="408" text-anchor="middle" fill="#475569" font-size="10">text detection</text>
  <text x="291" y="426" text-anchor="middle" fill="#475569" font-size="10">layout heuristics</text>
  <text x="291" y="455" text-anchor="middle" fill="#34d399" font-size="10">→ regions +</text>
  <text x="291" y="472" text-anchor="middle" fill="#34d399" font-size="10">   ordered text</text>

  <!-- DocProcessor → SessionManager -->
  <line x1="205" y1="508" x2="190" y2="557" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="210" y="537" fill="#64748b" font-size="10">stores</text>

  <!-- ── AGENT ───────────────────────────────────────────────────── -->
  <rect x="520" y="283" width="360" height="225" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="1.8"/>
  <text x="700" y="306" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="bold">Agent · LangGraph ReAct</text>
  <text x="700" y="323" text-anchor="middle" fill="#475569" font-size="10">GPT-4o-mini · MemorySaver (chat history per session)</text>

  <!-- System Prompt sub-box -->
  <rect x="535" y="332" width="330" height="88" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="700" y="351" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">System Prompt</text>
  <text x="700" y="369" text-anchor="middle" fill="#475569" font-size="10">• ALL ordered text  (every page, reading order)</text>
  <text x="700" y="387" text-anchor="middle" fill="#475569" font-size="10">• Layout region list  (id · type · page)</text>
  <text x="700" y="407" text-anchor="middle" fill="#f472b6" font-size="10">Text questions → answered directly, no retrieval</text>

  <!-- VLM Tools sub-box -->
  <rect x="535" y="432" width="330" height="65" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="700" y="451" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">VLM Tools  (tools.py)</text>
  <text x="700" y="469" text-anchor="middle" fill="#475569" font-size="10">AnalyzeChart · AnalyzeTable · AnalyzeImage</text>
  <text x="700" y="487" text-anchor="middle" fill="#f472b6" font-size="10">crop region → base64 → GPT-4o-mini vision</text>

  <!-- Agent → VLM -->
  <line x1="700" y1="508" x2="700" y2="557" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="708" y="537" fill="#64748b" font-size="10">API call</text>

  <!-- ── SESSION MANAGER ──────────────────────────────────────────── -->
  <rect x="30" y="562" width="310" height="78" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.8"/>
  <text x="185" y="587" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Session Manager</text>
  <text x="185" y="606" text-anchor="middle" fill="#94a3b8" font-size="10">In-memory · keyed by doc_id (SHA-256)</text>
  <text x="185" y="625" text-anchor="middle" fill="#475569" font-size="10">pages · regions · region images · ordered text</text>

  <!-- ── GPT-4o-mini VLM ────────────────────────────────────────── -->
  <rect x="585" y="562" width="285" height="78" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="727" y="587" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">GPT-4o-mini  (VLM)</text>
  <text x="727" y="606" text-anchor="middle" fill="#94a3b8" font-size="10">Multimodal API  (OpenAI)</text>
  <text x="727" y="625" text-anchor="middle" fill="#475569" font-size="10">base64 image + prompt → JSON result</text>

  <!-- Dashed: SessionManager → Agent  (agent reads document on each chat) -->
  <!-- Line from right edge of SessionMgr (340,600) to left edge of Agent (520,430) -->
  <!-- At DocProcessor right edge x=390: y=552  (below DocProcessor bottom y=508) ✓  -->
  <line x1="340" y1="600" x2="520" y2="430"
        stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4"
        marker-end="url(#ad)"/>
  <text x="430" y="518" text-anchor="middle" fill="#475569" font-size="10"
        transform="rotate(-43,430,518)">reads doc</text>
</svg>
